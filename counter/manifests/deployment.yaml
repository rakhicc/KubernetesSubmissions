apiVersion: apps/v1
kind: Deployment
metadata:
  name: ping-pong
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ping-pong
  template:
    metadata:
      labels:
        app: ping-pong
    spec:
      volumes:
        - name: shared-count
          persistentVolumeClaim:
            claimName: image-claim
      containers:
        - name: ping-pong
          image: rakhicc/ping-pong:v2
          volumeMounts:
          - name: shared-count
            mountPath: /data
          env:
            - name: PORT
              value: "3001"