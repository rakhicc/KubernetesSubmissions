apiVersion: argoproj.io/v1alpha1
kind: AnalysisTemplate
metadata:
  name: pingpong-cpu-analysis
  namespace: exercises
spec:
  metrics:
    - name: cpu-usage
      interval: 30s
      count: 3
      failureLimit: 1

      successCondition: result[0] < 0.000001

      provider:
        prometheus:
          address: http://prom-prometheus-server.monitoring.svc.cluster.local

          query: |
            sum(
              rate(
                container_cpu_usage_seconds_total{
                  namespace="exercises",
                  container!="",
                  pod!=""
                }[5m]
              )
            )