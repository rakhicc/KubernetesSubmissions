apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: todo-staging
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/rakhicc/KubernetesSubmissions.git
    targetRevision: main
    path: todo_node/overlays/staging

  destination:
    server: https://kubernetes.default.svc
    namespace: staging

  syncPolicy:
    automated:
      prune: true
      selfHeal: true