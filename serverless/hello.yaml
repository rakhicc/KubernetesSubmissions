apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: hello

spec:
  traffic:
  - revisionName: hello-00001
    percent: 50

  - latestRevision: true
    percent: 50

  template:
    spec:
      containers:
      - image: ghcr.io/knative/helloworld-go:latest
        env:
        - name: TARGET
          value: "Revision 2"