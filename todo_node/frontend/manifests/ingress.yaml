apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: todo-ingress
spec:
  rules:
    - http:
        paths:
          - path: /image
            pathType: Prefix
            backend:
              service:
                name: todobackend-svc
                port:
                  number: 80
          - path: /
            pathType: Prefix
            backend:
              service:
                name: todofrontend-svc
                port:
                  number: 80

          