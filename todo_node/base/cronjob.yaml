apiVersion: batch/v1
kind: CronJob
metadata:
  name: todo-generator
spec:
  schedule: "0 * * * *"   # every hour

  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: todo-job
              image: curlimages/curl:latest

              command:
                - /bin/sh
                - -c
                - |
                  echo "Fetching random Wikipedia URL...";
                  URL=$(curl -Ls -o /dev/null -w %{url_effective} https://en.wikipedia.org/wiki/Special:Random);
                  echo "URL: $URL";
                  curl -X POST http://todobackend-svc/todos \
                    -H "Content-Type: application/json" \
                    -d "{\"todo\":\"Read $URL\"}";
                  echo "Todo created";

          restartPolicy: OnFailure